services:
  backend:
    build:
      target: development 
    volumes:
      - ./backend:/app
      - /app/api/migrations
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=api.settings.development
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    stdin_open: true
    tty: true
