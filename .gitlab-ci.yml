stages:
  - build-ci-image
  - lint-typecheck
  - test
  - build
  - trigger-vm

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_TAG_BACKEND: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  IMAGE_TAG_FRONTEND: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA

.default-python-job:
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make && rm -rf /var/lib/apt/lists/*
    - pip install poetry

.default-node-job:
  image: node:20-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make && rm -rf /var/lib/apt/lists/*

lint-frontend:
  stage: lint-typecheck
  extends: .default-node-job
  script:
    - cd frontend
    - npm ci
    - make -C .. ci-fe-lint
    - make -C .. ci-fe-type-check

lint-backend:
  stage: lint-typecheck
  extends: .default-python-job
  script:
    - cd backend
    - poetry install --with dev
    - make -C .. ci-be-lint
    - make -C .. ci-be-type-check

test-backend:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # POSTGRES_DB: docappoint_test
    # POSTGRES_USER: postgres
    # POSTGRES_PASSWORD: password
    # DJANGO_SECRET_KEY: test-secret-key
    # DJANGO_SETTINGS_MODULE: api.settings.development
  before_script:
    - docker info
    - docker compose version
    - cp .env.example .env

    - docker compose -f docker-compose.ci.backend.yml -f docker-compose.override.yml build --build-arg TARGET=development backend
    - docker compose -f docker-compose.ci.backend.yml -f docker-compose.override.yml up -d postgres

    - |
      # Wait for postgres with timeout
      echo "Waiting for postgres to be ready..."
      max_attempts=30
      attempt=1
      
      while [ $attempt -le $max_attempts ]; do
        if docker compose -f docker-compose.ci.backend.yml -f docker-compose.override.yml exec -T postgres pg_isready -U postgres 2>/dev/null; then
          echo "Postgres is ready (attempt $attempt/$max_attempts)"
          break
        fi
        
        echo "  Waiting for postgres... (attempt $attempt/$max_attempts)"
        sleep 2
        attempt=$((attempt + 1))
      done
      
      if [ $attempt -gt $max_attempts ]; then
        echo "ERROR: Postgres failed to become ready after $max_attempts attempts (~$((max_attempts * 2)) seconds)"
        echo ""
        echo "Postgres logs:"
        docker compose -f docker-compose.ci.backend.yml logs postgres
        exit 1
      fi
    # - docker-compose exec postgres sh -c "until pg_isready -U postgres; do echo 'Waiting for postgres...'; sleep 2; done"
  script:
    - docker ps -a
    - docker network ls
    - docker compose run --rm backend sh -c "
        python manage.py makemigrations api --noinput &&
        python manage.py migrate api &&
        python manage.py migrate &&
        pytest
      "
  after_script:
    - docker compose down -v

test-frontend:
  stage: test
  image: docker:24
  services:
    - docker:dind
  before_script:
    - apk add --no-cache nodejs npm make
  script:
    - cd frontend
    - npm ci
    - make -C .. ci-fe-test-run-docker

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $IMAGE_TAG_BACKEND ./backend
    - docker push $IMAGE_TAG_BACKEND

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $IMAGE_TAG_FRONTEND ./frontend
    - docker push $IMAGE_TAG_FRONTEND